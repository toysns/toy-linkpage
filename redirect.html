<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リダイレクト中...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      color: #e0e0e0;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 360px; }
    .status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #00ff41;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .status.blink { animation: blink 1.5s infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .message {
      font-size: 14px;
      color: rgba(224,224,224,0.7);
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      text-decoration: none;
      color: #e0e0e0;
      background: rgba(255, 26, 26, 0.15);
      border: 1px solid #ff1a1a;
      padding: 16px 40px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(
        0 0, calc(100% - 10px) 0, 100% 10px,
        100% 100%, 10px 100%, 0 calc(100% - 10px)
      );
      margin-bottom: 12px;
    }
    .btn:active {
      background: rgba(255, 26, 26, 0.3);
    }
    .btn-copy {
      background: rgba(0, 255, 65, 0.08);
      border-color: #00ff41;
    }
    .btn-copy:active {
      background: rgba(0, 255, 65, 0.2);
    }
    .help-text {
      font-size: 12px;
      color: rgba(224,224,224,0.4);
      line-height: 1.8;
      margin-top: 20px;
    }
    .help-text strong {
      color: rgba(255, 204, 0, 0.8);
      font-weight: 700;
    }
    .copied {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #00ff41;
      letter-spacing: 2px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .copied.show { opacity: 1; }
    .hidden { display: none; }
    .warning-stripe {
      height: 4px;
      background: repeating-linear-gradient(
        -45deg, #ffcc00, #ffcc00 8px, #050508 8px, #050508 16px
      );
      margin-bottom: 24px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="warning-stripe"></div>

    <!-- Phase 1: Trying redirect -->
    <div id="phase-loading">
      <div class="status blink">/// REDIRECTING...</div>
      <p class="message">移動中...</p>
    </div>

    <!-- Phase 2: Redirect failed, show options -->
    <div id="phase-fallback" class="hidden">
      <div class="status">/// OPEN IN BROWSER</div>
      <p class="message">
        アプリ内ブラウザでは<br>開けないリンクです
      </p>

      <a id="openBtn" class="btn" href="#">リンクを開く</a>
      <button id="copyBtn" class="btn btn-copy">URLをコピー</button>
      <div id="copiedMsg" class="copied">/// COPIED TO CLIPBOARD</div>

      <div class="help-text">
        開けない場合は<strong>URLをコピー</strong>して<br>
        SafariまたはChromeで開いてください<br><br>
        または右上の <strong>「…」→「ブラウザで開く」</strong>
      </div>
    </div>

    <div class="warning-stripe" style="margin-top: 24px; margin-bottom: 0;"></div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var url = params.get('url');
      if (!url) return;

      var openBtn = document.getElementById('openBtn');
      var copyBtn = document.getElementById('copyBtn');
      var copiedMsg = document.getElementById('copiedMsg');
      openBtn.href = url;

      // Detect in-app browser
      var ua = navigator.userAgent.toLowerCase();
      var isAndroid = ua.indexOf('android') > -1;
      var isInApp = ua.indexOf('tiktok') > -1 || ua.indexOf('bytedance') > -1 ||
                    ua.indexOf('instagram') > -1 || ua.indexOf('fbav') > -1 ||
                    ua.indexOf('line/') > -1;

      // Android: try intent to open in Chrome
      if (isInApp && isAndroid) {
        var intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
          '#Intent;scheme=https;package=com.android.chrome;end';
        openBtn.href = intentUrl;
        window.location.href = intentUrl;
      }

      // Try LINE app scheme for line.me URLs
      var lineSchemeUrl = null;
      if (url.indexOf('line.me/ti/g2/') > -1) {
        // OpenChat: extract path and use line:// scheme
        lineSchemeUrl = url.replace('https://line.me', 'line://');
      } else if (url.indexOf('line.me/R/') > -1) {
        lineSchemeUrl = url.replace('https://line.me', 'line://');
      }

      // iOS / other: try LINE scheme first, then fallback to URL
      if (!isAndroid) {
        if (lineSchemeUrl) {
          // Try line:// scheme to open LINE app directly
          window.location.href = lineSchemeUrl;
          // If that didn't work, try the https URL after a short delay
          setTimeout(function() { window.location.href = url; }, 500);
        } else {
          window.location.href = url;
        }
      }

      // If still here after 2s, show fallback UI
      setTimeout(function() {
        document.getElementById('phase-loading').classList.add('hidden');
        document.getElementById('phase-fallback').classList.remove('hidden');
      }, 2000);

      // Copy URL button
      copyBtn.addEventListener('click', function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function() {
            copiedMsg.classList.add('show');
            setTimeout(function() { copiedMsg.classList.remove('show'); }, 2000);
          });
        } else {
          // Fallback for older browsers
          var textarea = document.createElement('textarea');
          textarea.value = url;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          copiedMsg.classList.add('show');
          setTimeout(function() { copiedMsg.classList.remove('show'); }, 2000);
        }
      });
    })();
  </script>
</body>
</html>
