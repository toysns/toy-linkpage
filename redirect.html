<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リダイレクト中...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      color: #e0e0e0;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 360px; }
    .status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #00ff41;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }
    .status.blink { animation: blink 1.5s infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .message {
      font-size: 14px;
      color: rgba(224,224,224,0.7);
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .btn {
      display: block;
      text-decoration: none;
      color: #e0e0e0;
      background: rgba(255, 26, 26, 0.15);
      border: 1px solid #ff1a1a;
      padding: 16px 40px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(
        0 0, calc(100% - 10px) 0, 100% 10px,
        100% 100%, 10px 100%, 0 calc(100% - 10px)
      );
      margin-bottom: 12px;
    }
    .btn-open {
      background: rgba(255, 102, 0, 0.14);
      border-color: #ff6600;
    }
    .btn-open:active {
      background: rgba(255, 102, 0, 0.26);
    }
    .btn:active {
      background: rgba(255, 26, 26, 0.3);
    }
    .btn-copy {
      background: rgba(0, 255, 65, 0.08);
      border-color: #00ff41;
    }
    .btn-copy:active {
      background: rgba(0, 255, 65, 0.2);
    }
    .help-text {
      font-size: 12px;
      color: rgba(224,224,224,0.4);
      line-height: 1.8;
      margin-top: 20px;
    }
    .help-text strong {
      color: rgba(255, 204, 0, 0.8);
      font-weight: 700;
    }
    .step-guide {
      text-align: left;
      margin-top: 20px;
      padding: 16px;
      background: rgba(255, 204, 0, 0.05);
      border: 1px solid rgba(255, 204, 0, 0.2);
      clip-path: polygon(
        0 0, calc(100% - 8px) 0, 100% 8px,
        100% 100%, 8px 100%, 0 calc(100% - 8px)
      );
    }
    .step-guide .step-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #ffcc00;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .step-guide ol {
      padding-left: 20px;
      font-size: 13px;
      color: rgba(224,224,224,0.7);
      line-height: 2;
    }
    .step-guide ol strong {
      color: #ffcc00;
    }
    .copied {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #00ff41;
      letter-spacing: 2px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .copied.show { opacity: 1; }
    .hidden { display: none; }
    .warning-stripe {
      height: 4px;
      background: repeating-linear-gradient(
        -45deg, #ffcc00, #ffcc00 8px, #050508 8px, #050508 16px
      );
      margin-bottom: 24px;
      opacity: 0.5;
    }
    .arrow-icon {
      display: inline-block;
      font-size: 20px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="warning-stripe"></div>

    <!-- Phase 1: Trying redirect -->
    <div id="phase-loading">
      <div class="status blink">/// REDIRECTING...</div>
      <p class="message">移動中...</p>
    </div>

    <!-- Phase 2: Redirect failed, show options -->
    <div id="phase-fallback" class="hidden">
      <div class="status">/// OPEN IN BROWSER</div>
      <div class="arrow-icon">↗</div>
      <p class="message">
        自動でLINEが開かない場合は、下のボタンをもう一度タップしてください。<br><br>
        右上の <strong style="color: #ffcc00;">「…」</strong> をタップして<br>
        <strong style="color: #ffcc00;">「ブラウザで開く」</strong> を選んでね！
      </p>

      <a id="openBtn" class="btn btn-open" href="#" rel="noopener">LINEで開く</a>
      <button id="copyBtn" class="btn btn-copy">URLをコピーする</button>
      <div id="copiedMsg" class="copied">/// COPIED TO CLIPBOARD</div>

      <div class="step-guide">
        <div class="step-title">/// HOW TO OPEN</div>
        <ol>
          <li>右上の <strong>「…」</strong> をタップ</li>
          <li><strong>「ブラウザで開く」</strong> を選択</li>
          <li>Safariで自動的に開きます</li>
        </ol>
      </div>
    </div>

    <div class="warning-stripe" style="margin-top: 24px; margin-bottom: 0;"></div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var destinations = {
        openchat: {
          appUrl: '',
          url: 'https://line.me/ti/g2/oYp56yKMawDb8OxqIkeenXXBFpPAnjOw94-lwQ?utm_source=invitation&utm_medium=link_copy&utm_campaign=default',
          copy: 'https://bit.ly/toysns-001'
        },
        consultation: {
          appUrl: '',
          url: 'https://bit.ly/sakiyomi010',
          copy: 'https://bit.ly/sakiyomi010'
        }
      };
      var to = params.get('to');
      var destination = destinations[to] || null;
      var url = destination ? destination.url : params.get('url');
      var appUrl = destination ? destination.appUrl : '';
      var type = to || params.get('type');
      var copy = destination ? destination.copy : params.get('copy');
      var debug = params.get('debug') === '1';
      if (!url) return;

      var openBtn = document.getElementById('openBtn');
      var copyBtn = document.getElementById('copyBtn');
      var copiedMsg = document.getElementById('copiedMsg');
      var fallbackShown = false;

      function showFallback() {
        if (fallbackShown) return;
        fallbackShown = true;
        document.getElementById('phase-loading').classList.add('hidden');
        document.getElementById('phase-fallback').classList.remove('hidden');
      }

      function openTarget() {
        if (!appUrl) {
          window.location.href = url;
          return;
        }

        var leftPage = false;
        var markLeft = function() { leftPage = true; };
        var onVisibilityChange = function() {
          if (document.hidden) {
            leftPage = true;
            document.removeEventListener('visibilitychange', onVisibilityChange);
          }
        };

        window.addEventListener('pagehide', markLeft, { once: true });
        window.addEventListener('blur', markLeft, { once: true });
        document.addEventListener('visibilitychange', onVisibilityChange);

        window.location.href = appUrl;
        setTimeout(function() {
          if (!leftPage) window.location.href = url;
        }, 900);
      }

      openBtn.setAttribute('href', appUrl || url);
      openBtn.addEventListener('click', function(e) {
        e.preventDefault();
        openTarget();
      });

      // Detect in-app browser
      var ua = navigator.userAgent.toLowerCase();
      var isAndroid = ua.indexOf('android') > -1;
      var isInApp = ua.indexOf('tiktok') > -1 || ua.indexOf('bytedance') > -1 ||
                    ua.indexOf('instagram') > -1 || ua.indexOf('fbav') > -1 ||
                    ua.indexOf('line/') > -1;

      if (debug) {
        showFallback();
      } else if (isInApp) {
        // TikTok/Instagram webviews can trap LINE universal links. Keep users on
        // a recovery screen instead of sending them to a dead-end web page.
        showFallback();

        // Android can often escape to Chrome via intent. If it fails, fallback stays visible.
        if (isAndroid) {
          setTimeout(function() {
            var intentUrl = 'intent://' + url.replace(/^https?:\/\//, '') +
              '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' +
              encodeURIComponent(url) + ';end';
            window.location.href = intentUrl;
          }, 300);
        }
      } else {
        // Normal browser: direct handoff is the shortest route.
        openTarget();
        setTimeout(showFallback, 1700);
      }

      // Prefer short URLs for manual copy, but keep the final URL as fallback.
      var copyUrl = copy || ((type === 'openchat') ? 'https://bit.ly/toysns-001' : url);
      copyBtn.addEventListener('click', function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(copyUrl).then(function() {
            copiedMsg.classList.add('show');
            setTimeout(function() { copiedMsg.classList.remove('show'); }, 2000);
          });
        } else {
          var textarea = document.createElement('textarea');
          textarea.value = copyUrl;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          copiedMsg.classList.add('show');
          setTimeout(function() { copiedMsg.classList.remove('show'); }, 2000);
        }
      });
    })();
  </script>
</body>
</html>
